<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jewels Lead Radar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: { colors: { navy: '#0A192F', gold: '#D4AF37', accent: '#8B5CF6' } }
            }
        }
    </script>
    <style>
        .toast { position: fixed; bottom: 20px; right: 20px; background: #0A192F; color: white; padding: 12px 24px; border-radius: 8px; z-index: 1000; display: none;}
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .email-row:hover { border-color: #D4AF37; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen">

    <header class="bg-navy text-white px-8 py-5 border-b-4 border-gold shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold tracking-wide flex items-center">
                    <i class="fas fa-radar text-gold mr-3"></i>
                    <span>JEWELS LEAD RADAR <span class="text-[10px] bg-green-500 px-2 py-0.5 rounded ml-2 uppercase">Zero-Cost Edition</span></span>
                </h1>
            </div>
            <div class="flex items-center space-x-4">
                <button onclick="clearAll()" class="text-sm text-gray-300 hover:text-white transition"><i class="fas fa-eraser mr-1"></i>Clear Board</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto mt-8 px-6 pb-12 grid grid-cols-1 md:grid-cols-12 gap-8">
        
        <div class="md:col-span-5 space-y-6">
            
            <div class="bg-white p-6 rounded-lg shadow-md border border-gray-200">
                <h2 class="text-lg font-bold text-navy mb-4"><i class="fas fa-building mr-2"></i>Target Identification</h2>
                <div class="space-y-4">
                    <input type="text" id="companyInput" placeholder="Company Name (e.g. NCR)" class="w-full border-2 border-gray-200 rounded-lg p-3 text-sm focus:border-gold outline-none" oninput="saveState(); updateDashboard();">
                    <input type="text" id="domainInput" placeholder="Domain (e.g. ncr.com)" class="w-full border-2 border-gray-200 rounded-lg p-3 text-sm focus:border-gold outline-none" oninput="saveState(); updateDashboard();">
                </div>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-md border-l-4 border-l-blue-500">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold text-navy"><i class="fas fa-users text-blue-500 mr-2"></i>Prospect Queue</h2>
                    <button onclick="extractFromLinkedIn()" id="extractBtn" class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold py-2 px-4 rounded transition flex items-center shadow-md">
                        <i class="fab fa-linkedin mr-2"></i>Auto-Extract
                    </button>
                </div>
                
                <div id="parsedNamesList" class="space-y-2 max-h-[300px] overflow-y-auto pr-2">
                    <div class="text-center py-6 text-gray-400 border-2 border-dashed border-gray-200 rounded-lg">
                        <i class="fas fa-satellite-dish text-3xl mb-2 opacity-50"></i>
                        <p class="text-sm">Run a LinkedIn search, then click Auto-Extract.</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="md:col-span-7 space-y-6">
            
            <div class="bg-white p-6 rounded-lg shadow-md border border-gray-200 border-l-4 border-l-gold">
                <div class="flex justify-between items-center mb-4 border-b pb-3">
                    <div>
                        <h2 class="text-lg font-bold text-navy"><i class="fas fa-bullseye mr-2 text-gold"></i>Local Probability Engine</h2>
                        <p class="text-xs text-gray-500 mt-1" id="activeTargetDisplay">Select a prospect to generate emails.</p>
                    </div>
                    <button onclick="pingDomain()" id="pingBtn" class="bg-navy hover:bg-navy-light text-white font-bold py-2 px-4 rounded-lg text-sm shadow-sm flex items-center transition opacity-50 cursor-not-allowed" disabled>
                        <i class="fas fa-server mr-2"></i>Ping Mail Server
                    </button>
                </div>
                
                <div id="emailList" class="space-y-3 max-h-[350px] overflow-y-auto pr-2">
                    <div class="text-center text-gray-400 py-6">
                        <i class="fas fa-fingerprint text-4xl mb-3 opacity-30"></i>
                        <p class="text-sm">Awaiting prospect and domain data...</p>
                    </div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-md border border-gray-200 border-l-4 border-l-accent">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 pb-4 border-b">
                    <div>
                        <h2 class="text-lg font-bold text-navy"><i class="fas fa-pen mr-2 text-accent"></i>Dynamic Pitch Engine</h2>
                    </div>
                    <div class="mt-3 md:mt-0 flex gap-2">
                        <button onclick="spinSubject()" class="border-2 border-gold text-gold hover:bg-gold hover:text-navy rounded-lg p-2 text-sm font-bold transition">
                            <i class="fas fa-sync-alt mr-1"></i>Spin
                        </button>
                        <select id="emailClientPref" class="bg-white border border-gray-300 rounded text-sm font-semibold p-2 focus:border-accent">
                            <option value="mailto">Desktop Client</option>
                            <option value="gmail">Gmail</option>
                            <option value="outlook">Outlook</option>
                        </select>
                    </div>
                </div>
                
                <textarea id="pitchOutput" rows="8" class="w-full border-2 border-gray-200 rounded-lg p-4 text-sm font-sans text-gray-800 focus:border-accent focus:outline-none resize-y bg-gray-50 leading-relaxed" readonly placeholder="Awaiting prospect data..."></textarea>
                
                <div class="mt-4 flex gap-4">
                    <button onclick="copyPitch()" id="copyPitchBtn" disabled class="flex-1 bg-gray-800 hover:bg-gray-700 text-white font-bold py-3 rounded-lg transition opacity-50 cursor-not-allowed">
                        <i class="fas fa-copy mr-2"></i>Copy Pitch
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div id="toast" class="toast"><i class="fas fa-info-circle mr-2"></i><span id="toastMsg"></span></div>

    <script>
        let activeTarget = { first: "", last: "", full: "" };
        let prospectQueue = [];
        let currentSubjectIndex = 0;

        window.onload = function() {
            const savedCompany = localStorage.getItem('target_company');
            const savedDomain = localStorage.getItem('target_domain');
            if(savedCompany) document.getElementById('companyInput').value = savedCompany;
            if(savedDomain) document.getElementById('domainInput').value = savedDomain;

            const savedQueue = localStorage.getItem('prospect_queue');
            if(savedQueue) {
                prospectQueue = JSON.parse(savedQueue);
                renderQueue();
            }
        };

        function showToast(msg) {
            document.getElementById('toastMsg').innerText = msg;
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        function clearAll() {
            document.getElementById('companyInput').value = '';
            document.getElementById('domainInput').value = '';
            prospectQueue = [];
            activeTarget = { first: "", last: "", full: "" };
            localStorage.removeItem('prospect_queue');
            saveState();
            renderQueue();
            updateDashboard();
            showToast("Board Cleared");
        }

        function saveState() {
            localStorage.setItem('target_company', document.getElementById('companyInput').value);
            localStorage.setItem('target_domain', document.getElementById('domainInput').value);
            generatePitch();
        }

        // --- LINKEDIN EXTRACTION ---
        function extractFromLinkedIn() {
            const btn = document.getElementById('extractBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Extracting...';

            chrome.tabs.query({url: "*://*.linkedin.com/*"}, function(tabs) {
                if(tabs.length === 0) {
                    showToast("No LinkedIn tabs found! Open a search first.");
                    btn.innerHTML = '<i class="fab fa-linkedin mr-2"></i>Auto-Extract';
                    return;
                }

                const targetTab = tabs[0];
                chrome.scripting.executeScript({
                    target: {tabId: targetTab.id},
                    files: ['content.js']
                }, () => {
                    chrome.tabs.sendMessage(targetTab.id, {action: "scrape_linkedin"}, function(response) {
                        btn.innerHTML = '<i class="fab fa-linkedin mr-2"></i>Auto-Extract';
                        
                        if(response && response.success && response.data.length > 0) {
                            prospectQueue = response.data;
                            localStorage.setItem('prospect_queue', JSON.stringify(prospectQueue));
                            renderQueue();
                            showToast(`Extracted ${response.data.length} prospects!`);
                        } else {
                            showToast("No names found. Ensure search results are loaded.");
                        }
                    });
                });
            });
        }

        function renderQueue() {
            const container = document.getElementById('parsedNamesList');
            if(prospectQueue.length === 0) {
                container.innerHTML = `<div class="text-center py-6 text-gray-400 border-2 border-dashed border-gray-200 rounded-lg"><p class="text-sm">Queue is empty</p></div>`;
                return;
            }

            container.innerHTML = prospectQueue.map(name => {
                const isSelected = activeTarget.full === name;
                return `
                    <div class="p-3 rounded border transition flex justify-between items-center cursor-pointer ${isSelected ? 'bg-blue-600 text-white border-blue-600 shadow' : 'bg-gray-50 border-gray-200 hover:border-blue-300 text-navy'}" onclick="selectProspect('${name.replace(/'/g, "\\'")}')">
                        <div class="font-bold text-sm">${name}</div>
                        ${isSelected ? '<i class="fas fa-check-circle"></i>' : '<i class="fas fa-chevron-right text-xs"></i>'}
                    </div>`;
            }).join('');
        }

        function selectProspect(fullName) {
            activeTarget.full = fullName;
            const parts = fullName.split(' ').filter(p => p.trim() !== '');
            activeTarget.first = parts[0] || '';
            activeTarget.last = parts.slice(1).join(' ') || '';
            
            document.getElementById('activeTargetDisplay').innerHTML = `Target: <strong>${fullName}</strong>`;
            
            renderQueue();
            updateDashboard();
        }

        // --- LOCAL GENERATOR & DNS CHECK (FREE) ---
        function updateDashboard() {
            const domain = document.getElementById('domainInput').value.trim().toLowerCase().replace('@', '');
            const first = activeTarget.first.toLowerCase();
            const last = activeTarget.last.toLowerCase();
            const emailList = document.getElementById('emailList');
            const pingBtn = document.getElementById('pingBtn');

            if (first && last && domain) {
                pingBtn.disabled = false;
                pingBtn.classList.remove('opacity-50', 'cursor-not-allowed');

                const perms = [
                    { format: "Standard Corporate", email: `${first}.${last}@${domain}` },
                    { format: "Initial + Last", email: `${first.charAt(0)}${last}@${domain}` },
                    { format: "First Only", email: `${first}@${domain}` },
                    { format: "First + Last", email: `${first}${last}@${domain}` }
                ];

                let html = perms.map(item => `
                    <div class="email-row flex items-center justify-between bg-white p-3 rounded-lg border border-gray-200 transition mb-2 shadow-sm">
                        <div class="flex flex-col">
                            <span class="font-mono text-navy font-bold text-sm">${item.email}</span>
                            <span class="text-[10px] text-gray-500 font-bold tracking-wider">${item.format}</span>
                        </div>
                        <div class="flex space-x-2">
                            <button onclick="navigator.clipboard.writeText('${item.email}'); showToast('Copied!')" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-1.5 px-3 rounded text-xs transition">
                                <i class="fas fa-copy"></i>
                            </button>
                            <button onclick="sendSpecific('${item.email}')" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-1.5 px-3 rounded text-xs transition">
                                <i class="fas fa-paper-plane mr-1"></i>Email
                            </button>
                        </div>
                    </div>
                `).join('');

                // Add Trojan / Gatekeeper Emails
                html += `
                <div class="mt-4 pt-3 border-t border-gray-200">
                    <p class="text-xs font-bold text-gray-500 uppercase mb-2"><i class="fas fa-door-open mr-1"></i>Gatekeeper / General Inboxes</p>
                    ${['info', 'office', 'hello'].map(prefix => `
                        <div class="email-row flex items-center justify-between bg-gray-50 p-2 rounded border border-gray-100 mb-1">
                            <span class="font-mono text-navy font-bold text-sm">${prefix}@${domain}</span>
                            <button onclick="sendSpecific('${prefix}@${domain}')" class="text-blue-600 hover:text-blue-800 text-xs font-bold"><i class="fas fa-paper-plane"></i></button>
                        </div>
                    `).join('')}
                </div>`;

                emailList.innerHTML = html;
            } else {
                pingBtn.disabled = true;
                pingBtn.classList.add('opacity-50', 'cursor-not-allowed');
                emailList.innerHTML = `<div class="text-center py-6 text-gray-400"><p class="text-sm">Awaiting prospect name and domain...</p></div>`;
            }
        }

        async function pingDomain() {
            const domain = document.getElementById('domainInput').value.trim();
            const btn = document.getElementById('pingBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Pinging...';
            
            try {
                // Free Google DNS API to check if Mail Exchange (MX) records exist
                const response = await fetch(`https://dns.google/resolve?name=${domain}&type=MX`);
                const data = await response.json();

                if (data.Answer && data.Answer.length > 0) {
                    btn.classList.replace('bg-navy', 'bg-green-500');
                    btn.classList.replace('hover:bg-navy-light', 'hover:bg-green-600');
                    btn.innerHTML = '<i class="fas fa-check-circle mr-2"></i>Server Active';
                    showToast(`The mail server for ${domain} is live and accepting mail.`);
                } else {
                    btn.classList.replace('bg-navy', 'bg-red-500');
                    btn.classList.replace('hover:bg-navy-light', 'hover:bg-red-600');
                    btn.innerHTML = '<i class="fas fa-times-circle mr-2"></i>Server Dead';
                    showToast(`Warning: No mail server found for ${domain}.`, false);
                }
            } catch (error) {
                btn.innerHTML = '<i class="fas fa-exclamation-triangle mr-2"></i>Error';
            }

            setTimeout(() => {
                btn.className = "bg-navy hover:bg-navy-light text-white font-bold py-2 px-4 rounded-lg text-sm shadow-sm flex items-center transition";
                btn.innerHTML = '<i class="fas fa-server mr-2"></i>Ping Mail Server';
            }, 4000);
        }

        // --- PITCH GENERATION ---
        function generatePitch() {
            const company = document.getElementById('companyInput').value || "[Company Name]";
            const first = activeTarget.first ? activeTarget.first.charAt(0).toUpperCase() + activeTarget.first.slice(1) : "[Name]";
            
            const subjects = [
                `Corporate travel solutions for ${company}`,
                `Streamlining ${company}'s business travel`,
                `Executive transport synergy - ${company}`
            ];
            
            const pitch = `Subject: ${subjects[currentSubjectIndex % subjects.length]}\n\nDear ${first},\n\nI'm reaching out on behalf of Jewels Airport Transfers. We specialize in providing seamless executive transport for corporate teams across the UK.\n\nI wanted to explore if we could assist ${company} with reliable, stress-free travel logistics.\n\nKind regards,\nLuisa Cioni`;

            document.getElementById('pitchOutput').value = pitch;

            const hasData = (company !== "[Company Name]" && first !== "[Name]");
            document.getElementById('copyPitchBtn').disabled = !hasData;
            document.getElementById('copyPitchBtn').classList.toggle('opacity-50', !hasData);
        }

        function spinSubject() { currentSubjectIndex++; generatePitch(); showToast("Subject Rotated"); }
        function copyPitch() { navigator.clipboard.writeText(document.getElementById('pitchOutput').value); showToast('Pitch Copied!'); }
        
        function sendSpecific(emailAddress) {
            const pitch = document.getElementById('pitchOutput').value;
            const lines = pitch.split('\n');
            const sub = encodeURIComponent(lines[0].replace('Subject: ', ''));
            const body = encodeURIComponent(lines.slice(2).join('\n'));
            const client = document.getElementById('emailClientPref').value;
            
            let url = `mailto:${emailAddress}?subject=${sub}&body=${body}`;
            if(client === 'gmail') url = `https://mail.google.com/mail/?view=cm&fs=1&to=${emailAddress}&su=${sub}&body=${body}`;
            if(client === 'outlook') url = `https://outlook.live.com/owa/?path=/mail/action/compose&to=${emailAddress}&subject=${sub}&body=${body}`;
            
            window.open(url, client === 'mailto' ? '_top' : '_blank');
        }
    </script>
</body>
</html>
